<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Tab</title>
    <!-- Font preconnect hints are intentionally omitted.
         Chrome MV3 extensions block external network requests from extension
         pages via CSP, so preconnect/dns-prefetch to fonts.googleapis.com
         causes CSP violations on every new tab load, which makes Chrome mark
         the extension as broken and drop it after restart. Fonts are loaded
         dynamically by useSettings() only when needed. -->
    <style>
      /* Instant background based on system preference */
      :root {
        background-color: #F5F5F5;
        color-scheme: light dark;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          background-color: #222526;
        }
      }
      html, body {
        margin: 0;
        padding: 0;
        background-color: inherit;
        min-height: 100vh;
      }
      #root {
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
